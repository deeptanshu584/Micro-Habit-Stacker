name: habit_stacker_v2
description: A habit stacking app built with Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  # reorderable_list: ^0.2.4 (Removing problematic dependency for now)
  emoji_picker_flutter: ^2.2.0
  haptic_feedback: ^0.5.1+1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11
  riverpod_generator: 2.3.5

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/sounds/
